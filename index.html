<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AÜRÖ HUB</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1c1c1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        :root { --danger: #ff3b30; --dark: #1c1c1e; --bg: #f2f2f7; --accent: #007aff; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-top: env(safe-area-inset-top); }
        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Bubbles */
        .bubble { padding: 12px 18px; border-radius: 22px; max-width: 82%; font-size: 15px; word-wrap: break-word; line-height: 1.4; }
        .sent { background: var(--dark); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .recv { background: white; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .chat-img { width: 100%; max-width: 250px; border-radius: 15px; margin-top: 5px; display: block; }

        /* Notification & Warnings */
        .welcome-note { align-self: center; background: rgba(0,0,0,0.06); color: #555; font-size: 11px; padding: 6px 15px; border-radius: 20px; margin: 8px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .warning-msg { background: #fff0f0; border: 2px solid var(--danger); color: var(--danger); padding: 15px; border-radius: 20px; text-align: center; font-weight: 900; margin: 10px 0; }
        
        /* Input Bar */
        .input-bar { background: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #eee; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .msg-in { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #f0f0f5; outline: none; font-size: 15px; }
        .btn-icon { font-size: 26px; cursor: pointer; border: none; background: none; display: flex; align-items: center; }

        /* Admin Dashboard */
        #admin-dash { position: fixed; top: 0; width: 100%; height: 80vh; background: white; z-index: 1000; display: none; padding: 25px; border-radius: 0 0 30px 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); overflow-y: auto; }
        .u-card { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="admin-dash">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 style="margin:0;">HUB ACCESS</h2>
        <button onclick="toggleAdmin()" style="border:none; background:#eee; border-radius:50%; width:35px; height:35px;">✕</button>
    </div>
    <div id="request-list"></div>
</div>

<div id="login-scr" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:white; padding:40px; border-radius:35px; width:100%; max-width:360px; text-align:center;">
        <h1 style="margin:0; font-weight:900;">AÜRÖ HUB</h1>
        <p style="color:#888; margin-bottom:25px; font-size:14px;">Stable v13.8 | Advanced</p>
        <input type="text" id="uName" placeholder="Name" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #eee; outline:none;">
        <input type="tel" id="uPh" placeholder="Phone Number" style="width:100%; padding:15px; margin-bottom:15px; border-radius:15px; border:1px solid #eee; outline:none;">
        <button onclick="login()" style="width:100%; padding:15px; border-radius:15px; border:none; background:black; color:white; font-weight:bold; cursor:pointer;">CONNECT</button>
    </div>
</div>

<div id="chat-scr" style="display:none; flex-direction:column; height:100vh;">
    <div class="header">
        <b style="font-size:18px;">AÜRÖ HUB</b>
        <button id="admin-btn" onclick="toggleAdmin()" style="display:none; border:none; background:none; font-size:22px;">🛡️</button>
    </div>
    <div id="msg-flow"></div>
    <div class="input-bar">
        <label class="btn-icon">⊕<input type="file" id="img-in" hidden accept="image/*" onchange="sendImg(this)"></label>
        <input type="text" id="msg-box" class="msg-in" placeholder="Message..." onkeypress="if(event.key==='Enter') sendTxt()">
        <button onclick="sendTxt()" class="btn-icon" style="color:var(--accent);">➤</button>
    </div>
</div>

<script>
    const ADMIN_PH = "09672264454";
    const TOXIC = ["စောက်", "လိုး", "မင်းမေ", "ဖာ", "လီး", "မအေဘေး", "စောက်ပတ်", "လိုးပဲ", "မအေလိုး", "နှမလိုး"];
    let myName = "", myPhone = "", isAdmin = false;
    let pendingUsers = new Map();

    const ably = new Ably.Realtime({ key: 'Nt4BVQ.HoIzUA:eXv4-B4_uJx-0PmEN1WDOQ4KMjreeEUe2_G6F5VObd8' });
    const channel = ably.channels.get('auro_v13_8_final');

    function toggleAdmin() {
        const d = document.getElementById('admin-dash');
        d.style.display = (d.style.display === 'block') ? 'none' : 'block';
    }

    function login() {
        myName = document.getElementById('uName').value.trim();
        myPhone = document.getElementById('uPh').value.trim();
        if(!myName || !myPhone) return;

        if(myPhone === ADMIN_PH) { 
            isAdmin = true; 
            startHub(); 
            channel.publish('chat', { type: 'welcome', user: myName + " (Admin)" });
        } else { 
            document.getElementById('login-scr').innerHTML = "<h3>WAITING FOR ADMIN...</h3>";
            channel.publish('join_req', { name: myName, phone: myPhone }); 
        }
    }

    channel.subscribe('control', (m) => {
        if(m.data.target === myPhone) {
            if(m.data.action === 'allow') {
                startHub();
                channel.publish('chat', { type: 'welcome', user: myName });
            }
            if(m.data.action === 'block') location.reload();
        }
    });

    function startHub() {
        document.getElementById('login-scr').style.display = 'none';
        document.getElementById('chat-scr').style.display = 'flex';
        if(isAdmin) document.getElementById('admin-btn').style.display = 'block';
        channel.subscribe('chat', (m) => render(m.data));
        if(isAdmin) channel.subscribe('join_req', (m) => { pendingUsers.set(m.data.phone, m.data.name); updateAdminUI(); });
    }

    function updateAdminUI() {
        const list = document.getElementById('request-list');
        list.innerHTML = "";
        pendingUsers.forEach((name, ph) => {
            list.innerHTML += `<div class="u-card"><div><b>${name}</b><br><small>${ph}</small></div>
            <div><button onclick="doAct('${ph}','allow')" style="background:black; color:white; border-radius:10px; border:none; padding:8px 15px;">ALLOW</button></div></div>`;
        });
    }

    function doAct(ph, act) { channel.publish('control', { target: ph, action: act }); pendingUsers.delete(ph); updateAdminUI(); }

    function sendTxt() {
        let val = document.getElementById('msg-box').value;
        if(!val.trim()) return;

        if(!isAdmin && TOXIC.some(w => val.includes(w))) {
            channel.publish('control', { target: myPhone, action: 'block' });
            return;
        }

        let type = (isAdmin && val.startsWith('!')) ? 'warn' : 'txt';
        channel.publish('chat', { user: myName, phone: myPhone, text: (type==='warn'?val.substring(1):val), type: type, admin: isAdmin });
        document.getElementById('msg-box').value = '';
    }

    function sendImg(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX = 700;
                let w = img.width, h = img.height;
                if(w > MAX) { h *= MAX/w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                channel.publish('chat', { user: myName, phone: myPhone, img: canvas.toDataURL('image/jpeg', 0.6), type: 'img', admin: isAdmin });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function render(data) {
        const flow = document.getElementById('msg-flow');
        const isMe = data.phone === myPhone;
        const div = document.createElement('div');
        
        if(data.type === 'welcome') {
            div.className = 'welcome-note';
            div.innerHTML = `✨ ${data.user} has entered the hub`;
        } 
        else if(data.type === 'warn') {
            div.className = 'warning-msg';
            div.innerHTML = `🛡️ ADMIN: ${data.text}`;
        } 
        else {
            div.className = `bubble ${isMe ? 'sent' : 'recv'}`;
            let content = (data.type === 'img') ? `<img src="${data.img}" class="chat-img" onclick="window.open(this.src)">` : data.text;
            div.innerHTML = `<small style="display:block; font-size:10px; font-weight:bold; opacity:0.7;">${data.user} ${data.admin?'🛡️':''}</small>${content}`;
        }
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>
